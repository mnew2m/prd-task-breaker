spring:
  profiles:
    active: dev
  application:
    name: prd-task-breaker
  jackson:
    serialization:
      write-dates-as-timestamps: false

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:prdbreaker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false

ai:
  provider: mock

logging:
  level:
    com.prdbreaker: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

ai:
  provider: claude
  claude:
    api-key: ${ANTHROPIC_API_KEY}
    model: ${AI_MODEL:claude-haiku-4-5-20251001}
    max-tokens: 8192

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
