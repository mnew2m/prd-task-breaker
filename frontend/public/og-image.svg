<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#6366f1"/>

  <!-- Icon (document → structured output) -->
  <g transform="translate(100, 180)">
    <!-- Document -->
    <rect x="0" y="0" width="100" height="130" rx="10" fill="#ffffff" opacity="0.95"/>
    <rect x="16" y="20" width="50" height="6" rx="3" fill="#1a1a2e" opacity="0.6"/>
    <rect x="16" y="34" width="68" height="6" rx="3" fill="#1a1a2e" opacity="0.3"/>
    <rect x="16" y="48" width="40" height="6" rx="3" fill="#1a1a2e" opacity="0.3"/>
    <rect x="16" y="68" width="68" height="1" fill="#6366f1" opacity="0.4"/>
    <rect x="16" y="80" width="6" height="6" rx="1.5" fill="#6366f1"/>
    <rect x="28" y="80" width="40" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="16" y="94" width="6" height="6" rx="1.5" fill="#6366f1"/>
    <rect x="28" y="94" width="30" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="16" y="108" width="6" height="6" rx="1.5" fill="#6366f1"/>
    <rect x="28" y="108" width="50" height="6" rx="3" fill="#6366f1" opacity="0.4"/>

    <!-- Arrow -->
    <path d="M 120 65 L 160 65" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M 155 55 L 165 65 L 155 75" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <!-- Structured cards -->
    <rect x="185" y="0" width="80" height="36" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="195" y="10" width="36" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
    <rect x="195" y="20" width="56" height="4" rx="2" fill="#ffffff" opacity="0.3"/>

    <rect x="185" y="46" width="80" height="36" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="195" y="56" width="28" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
    <rect x="195" y="66" width="50" height="4" rx="2" fill="#ffffff" opacity="0.3"/>

    <rect x="185" y="92" width="80" height="36" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="195" y="102" width="44" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
    <rect x="195" y="112" width="60" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="520" y="245" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">PRD Task Breaker</text>

  <!-- Subtitle -->
  <text x="520" y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#ffffff" opacity="0.65">PRD to Structured Dev Tasks, Powered by AI</text>

  <!-- Tags -->
  <g transform="translate(520, 340)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#6366f1" opacity="0.25"/>
    <text x="40" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Vue 3</text>

    <rect x="92" y="0" width="120" height="30" rx="6" fill="#6366f1" opacity="0.25"/>
    <text x="152" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Spring Boot</text>

    <rect x="224" y="0" width="110" height="30" rx="6" fill="#6366f1" opacity="0.25"/>
    <text x="279" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Claude AI</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="#6366f1"/>
</svg>
