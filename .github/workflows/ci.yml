name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
      - name: Build and Test Backend
        run: cd backend && gradle build --no-daemon
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/html/

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Security audit (production dependencies only)
        # --omit=dev: vite/vitest/esbuild 등 개발 전용 의존성 제외
        # 이들은 dev server 관련 취약점으로 프로덕션 빌드에 미포함
        run: cd frontend && npm audit --omit=dev --audit-level=high
      - name: Type check
        run: cd frontend && npm run type-check
      - name: Test with coverage
        run: cd frontend && npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Build
        run: cd frontend && npm run build

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('backend/build.gradle') }}
          restore-keys: owasp-nvd-${{ runner.os }}-
      - name: OWASP Dependency Check
        # NVD_API_KEY secret 미설정 시 rate-limit 경고 후 계속 진행 (continue-on-error)
        # Critical(CVSS≥9) 취약점 발견 시 빌드 실패
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: cd backend && gradle dependencyCheckAnalyze --no-daemon
      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/build/reports/dependency-check-report.html

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps
      - name: Run E2E smoke tests
        run: cd frontend && npm run test:e2e -- --project=chromium
      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: frontend/playwright-report/
