name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
      - name: Build and Test Backend
        run: cd backend && gradle build --no-daemon
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/html/
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Security audit (production dependencies only)
        # --omit=dev: vite/vitest/esbuild 등 개발 전용 의존성 제외
        # 이들은 dev server 관련 취약점으로 프로덕션 빌드에 미포함
        run: cd frontend && npm audit --omit=dev --audit-level=high
      - name: Type check
        run: cd frontend && npm run type-check
      - name: Test with coverage
        run: cd frontend && npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Build
        run: cd frontend && npm run build


  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps
      - name: Run E2E smoke tests
        run: cd frontend && npx playwright test e2e/smoke.spec.ts e2e/user-flows.spec.ts --project=chromium
      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: frontend/playwright-report/

  e2e-integration:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
      - name: Start backend
        run: cd backend && gradle bootRun --no-daemon &
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/v1/health && break
            sleep 2
          done
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps
      - name: Run integration E2E tests
        run: cd frontend && npx playwright test e2e/integration.spec.ts --project=chromium
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-integration-report
          path: frontend/playwright-report/
