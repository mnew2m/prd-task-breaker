name: Performance Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Backend base URL (e.g. https://your-app.railway.app)'
        required: true
        default: 'https://your-app.railway.app'

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          K6_VERSION=$(curl -s https://api.github.com/repos/grafana/k6/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv k6-*/k6 /usr/local/bin/

      - name: Run k6 performance tests
        run: k6 run --summary-export=k6-summary.json perf/load-test.js
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-summary.json
